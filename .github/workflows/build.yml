name: Build and Release

on:
  release:
    types: [published]

jobs:

  # ── Mac build ──────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml loguru pyinstaller

      - name: Build app
        run: |
          pyinstaller --onedir --windowed \
            --name "hyperspectral_data_ingestion" \
            --add-data "utils:utils" \
            --add-data "ingestion:ingestion" \
            app/ingest_app.py

      - name: Zip app
        run: |
          cd dist
          zip -r hyperspectral_data_ingestion_mac.zip hyperspectral_data_ingestion.app

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hyperspectral_data_ingestion_mac.zip

  # ── Windows build ──────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml loguru pyinstaller

      - name: Build app
        run: |
          pyinstaller --onedir --windowed `
            --name "hyperspectral_data_ingestion" `
            --add-data "utils;utils" `
            --add-data "ingestion;ingestion" `
            app/ingest_app.py

      - name: Zip app
        run: |
          cd dist
          Compress-Archive -Path hyperspectral_data_ingestion -DestinationPath hyperspectral_data_ingestion_windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hyperspectral_data_ingestion_windows.zip